name: Check Flutter Version

on:
  schedule:
    # 每 6 小时检查一次新版本（UTC 0:00, 6:00, 12:00, 18:00）
    - cron: '0 */6 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  check-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    
    - name: Check Flutter latest engine version from source
      id: check
      run: |
        set -euo pipefail
        api_get() {
          local url="$1"
          local body_file="$2"
          local header_file="$3"
          curl -sSL --retry 3 --retry-delay 1 --connect-timeout 5 --max-time 20 \
            -D "$header_file" \
            -o "$body_file" \
            -w "%{http_code}" \
            -H "User-Agent: flutter-font-fix-ci" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "$url"
        }

        resolve_tag_commit() {
          local tag="$1"
          local body_file header_file http_code object_type object_sha
          body_file=$(mktemp)
          header_file=$(mktemp)

          echo "获取 Flutter 提交 SHA (refs/tags/$tag)..." >&2
          http_code=$(api_get "https://api.github.com/repos/flutter/flutter/git/ref/tags/$tag" "$body_file" "$header_file")
          echo "git/ref HTTP: $http_code" >&2

          if [[ "$http_code" != "200" ]]; then
            echo "API 路径 git/ref 不可用，尝试 git/refs 备用路径..." >&2
            http_code=$(api_get "https://api.github.com/repos/flutter/flutter/git/refs/tags/$tag" "$body_file" "$header_file")
            echo "git/refs HTTP: $http_code" >&2
          fi

          if [[ "$http_code" != "200" ]]; then
            echo "调试信息: API 响应头" >&2
            sed -n '1,20p' "$header_file" >&2
            echo "调试信息: API 响应体" >&2
            sed -n '1,40p' "$body_file" >&2
            rm -f "$body_file" "$header_file"
            return 1
          fi

          object_type=$(jq -r '.object.type // empty' "$body_file")
          object_sha=$(jq -r '.object.sha // empty' "$body_file")
          echo "Tag object type: ${object_type:-unknown}" >&2

          if [[ -z "$object_sha" ]]; then
            echo "调试信息: API 响应体缺少 object.sha" >&2
            sed -n '1,40p' "$body_file" >&2
            rm -f "$body_file" "$header_file"
            return 1
          fi

          if [[ "$object_type" == "tag" ]]; then
            local tag_body_file tag_header_file
            tag_body_file=$(mktemp)
            tag_header_file=$(mktemp)
            http_code=$(api_get "https://api.github.com/repos/flutter/flutter/git/tags/$object_sha" "$tag_body_file" "$tag_header_file")
            echo "git/tags HTTP: $http_code" >&2
            if [[ "$http_code" != "200" ]]; then
              echo "调试信息: tag object 响应头" >&2
              sed -n '1,20p' "$tag_header_file" >&2
              echo "调试信息: tag object 响应体" >&2
              sed -n '1,40p' "$tag_body_file" >&2
              rm -f "$body_file" "$header_file" "$tag_body_file" "$tag_header_file"
              return 1
            fi
            object_sha=$(jq -r '.object.sha // empty' "$tag_body_file")
            rm -f "$tag_body_file" "$tag_header_file"
          fi

          rm -f "$body_file" "$header_file"
          [[ -n "$object_sha" ]] || return 1
          printf '%s\n' "$object_sha"
        }

        echo "正在检查 Flutter Engine 最新版本（从 Git tags）..."

        echo "从 Git 仓库直接获取最新 stable tag..."
        LATEST_TAG=$(git ls-remote --tags --refs https://github.com/flutter/flutter.git | \
          awk '{print $2}' | \
          sed 's|refs/tags/||' | \
          grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | \
          sort -V | \
          tail -n1)

        if [ -z "$LATEST_TAG" ]; then
          echo "❌ 无法获取 Flutter 版本"
          exit 1
        fi
        
        echo "最新 Flutter 版本: $LATEST_TAG"
        FLUTTER_VERSION="$LATEST_TAG"

        FLUTTER_COMMIT_SHA=$(resolve_tag_commit "$LATEST_TAG") || true
        if [ -z "${FLUTTER_COMMIT_SHA:-}" ] || [ "$FLUTTER_COMMIT_SHA" = "null" ]; then
          echo "❌ 无法获取 Flutter 提交 SHA"
          exit 1
        fi
        
        echo "Flutter SDK version: $FLUTTER_VERSION"
        echo "Flutter commit: $FLUTTER_COMMIT_SHA"
        
        echo "latest_version=$FLUTTER_VERSION" >> $GITHUB_OUTPUT
        echo "flutter_commit=$FLUTTER_COMMIT_SHA" >> $GITHUB_OUTPUT
        
        # 检查是否已存在该版本的 SO 文件
        SO_FILE="lib/libflutter_linux_gtk.so.$FLUTTER_VERSION"
        if [ -f "$SO_FILE" ]; then
          echo "✅ Version $FLUTTER_VERSION already exists"
          echo "build_needed=false" >> $GITHUB_OUTPUT
        else
          echo "🆕 New version detected: $FLUTTER_VERSION"
          echo "build_needed=true" >> $GITHUB_OUTPUT
        fi
    
    - name: Trigger build workflow
      if: steps.check.outputs.build_needed == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          console.log('触发构建工作流: Flutter ${{ steps.check.outputs.latest_version }} (Flutter commit: ${{ steps.check.outputs.flutter_commit }})');
          
          await github.rest.repos.createDispatchEvent({
            owner: context.repo.owner,
            repo: context.repo.repo,
            event_type: 'build-flutter-engine',
            client_payload: {
              flutter_version: '${{ steps.check.outputs.latest_version }}',
              flutter_commit: '${{ steps.check.outputs.flutter_commit }}'
            }
          });
          
          console.log('✅ 构建工作流已触发');
    
    - name: Collect all release engine hashes
      run: |
        set -euo pipefail
        git ls-remote --tags --refs https://github.com/flutter/flutter.git 2>/dev/null | \
          awk '{print $2}' |  sed 's/refs\/tags\///' | \
          grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V -r | \
          while read tag; do
              content=$(curl -fsSL --retry 3 --retry-delay 1 --connect-timeout 5 --max-time 20 \
                "https://raw.githubusercontent.com/flutter/flutter/$tag/bin/internal/engine.version")
              printf "%s | %s\n" "$content" "$tag"
          done > flutter.engine.hash.version

        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        git add flutter.engine.hash.version
    
        if git diff --cached --quiet; then
          echo "ℹ️ 无需推送，未检测到新的变更"
          exit 0
        fi

        git commit -m "ci: update flutter.engine.hash.version (auto)"
    
        # 使用 --autostash 选项拉取并 rebase（自动处理未提交的内容）
        echo "更新本地 main 分支以避免推送冲突..."
        git pull --rebase --autostash origin main
        
        git push origin HEAD:main || echo "Push skipped"

    - name: Create issue for manual build (fallback)
      if: steps.check.outputs.build_needed == 'true' && failure()
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '🆕 New Flutter version detected: ${{ steps.check.outputs.latest_version }}',
            body: `检测到新的 Flutter 版本 **${{ steps.check.outputs.latest_version }}**
            
            Flutter 提交: \\`${{ steps.check.outputs.flutter_commit }}\\`

            请手动触发构建工作流：
            1. 进入 [Actions](https://github.com/${{ github.repository }}/actions/workflows/build-flutter-engine.yml)
            2. 点击 "Run workflow"
            3. 输入版本号: \`${{ steps.check.outputs.latest_version }}\`
            4. 点击 "Run workflow" 按钮
            `,
            labels: ['enhancement', 'auto-build']
          });
