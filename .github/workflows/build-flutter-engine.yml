name: Build Flutter Engine (with Cache)

on:
  workflow_dispatch:
    inputs:
      flutter_version:
        description: 'Flutter SDK version (e.g., 3.24.3)'
        required: true
        type: string
      flutter_commit:
        description: 'Flutter repo commit SHA (optional; recommended)'
        required: false
        type: string
  
  repository_dispatch:
    types: [build-flutter-engine]

env:
  DEPOT_TOOLS_DIR: ${{ github.workspace }}/depot_tools
  ENGINE_DIR: ${{ github.workspace }}/flutter-engine

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 小时超时限制
    
    steps:
    - name: Set input variables
      id: set-vars
      run: |
        # 处理两种触发方式的输入参数
        if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
          echo "flutter_version=${{ github.event.client_payload.flutter_version }}" >> $GITHUB_OUTPUT
          echo "flutter_commit=${{ github.event.client_payload.flutter_commit }}" >> $GITHUB_OUTPUT
        else
          echo "flutter_version=${{ inputs.flutter_version }}" >> $GITHUB_OUTPUT
          echo "flutter_commit=${{ inputs.flutter_commit }}" >> $GITHUB_OUTPUT
        fi
    
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Free up disk space
      run: |
        echo "清理磁盘空间..."
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        df -h
    
    - name: Setup build environment
      run: |
        echo "安装编译依赖..."
        sudo apt-get update
        sudo apt-get install -y \
          git curl unzip xz-utils zip \
          libglu1-mesa ninja-build \
          clang cmake pkg-config \
          libgtk-3-dev libblkid-dev \
          liblzma-dev libgcrypt20-dev \
          libfontconfig1-dev \
          python3 python3-pip \
          jq
        
        echo "✅ 依赖安装完成"
    
    - name: Cache depot_tools
      id: cache-depot-tools
      uses: actions/cache@v4
      with:
        path: ${{ env.DEPOT_TOOLS_DIR }}
        key: depot-tools-${{ runner.os }}-v1
        restore-keys: |
          depot-tools-${{ runner.os }}-
    
    - name: Setup depot_tools
      if: steps.cache-depot-tools.outputs.cache-hit != 'true'
      run: |
        echo "克隆 depot_tools..."
        git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git "$DEPOT_TOOLS_DIR"
    
    - name: Add depot_tools to PATH
      run: |
        echo "$DEPOT_TOOLS_DIR" >> $GITHUB_PATH
        echo "✅ depot_tools 已添加到 PATH"
    
    - name: Save depot_tools cache manually
      if: always() && steps.cache-depot-tools.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: ${{ env.DEPOT_TOOLS_DIR }}
        key: depot-tools-${{ runner.os }}-v1
    
    - name: Resolve Flutter revision
      id: resolve-rev
      run: |
        set -euo pipefail
        api_get() {
          local url="$1"
          local body_file="$2"
          local header_file="$3"
          curl -sSL --retry 3 --retry-delay 1 --connect-timeout 5 --max-time 20 \
            -D "$header_file" \
            -o "$body_file" \
            -w "%{http_code}" \
            -H "User-Agent: flutter-font-fix-ci" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "$url"
        }

        resolve_tag_commit() {
          local tag="$1"
          local body_file header_file http_code object_type object_sha
          body_file=$(mktemp)
          header_file=$(mktemp)

          http_code=$(api_get "https://api.github.com/repos/flutter/flutter/git/ref/tags/$tag" "$body_file" "$header_file")
          echo "git/ref HTTP: $http_code"
          if [[ "$http_code" != "200" ]]; then
            http_code=$(api_get "https://api.github.com/repos/flutter/flutter/git/refs/tags/$tag" "$body_file" "$header_file")
            echo "git/refs HTTP: $http_code"
          fi

          if [[ "$http_code" != "200" ]]; then
            echo "调试信息: API 响应头"
            sed -n '1,20p' "$header_file"
            echo "调试信息: API 响应体"
            sed -n '1,40p' "$body_file"
            rm -f "$body_file" "$header_file"
            return 1
          fi

          object_type=$(jq -r '.object.type // empty' "$body_file")
          object_sha=$(jq -r '.object.sha // empty' "$body_file")
          echo "Tag object type: ${object_type:-unknown}"

          if [[ -z "$object_sha" ]]; then
            echo "调试信息: API 响应体缺少 object.sha"
            sed -n '1,40p' "$body_file"
            rm -f "$body_file" "$header_file"
            return 1
          fi

          if [[ "$object_type" == "tag" ]]; then
            local tag_body_file tag_header_file
            tag_body_file=$(mktemp)
            tag_header_file=$(mktemp)
            http_code=$(api_get "https://api.github.com/repos/flutter/flutter/git/tags/$object_sha" "$tag_body_file" "$tag_header_file")
            echo "git/tags HTTP: $http_code"
            if [[ "$http_code" != "200" ]]; then
              echo "调试信息: tag object 响应头"
              sed -n '1,20p' "$tag_header_file"
              echo "调试信息: tag object 响应体"
              sed -n '1,40p' "$tag_body_file"
              rm -f "$body_file" "$header_file" "$tag_body_file" "$tag_header_file"
              return 1
            fi
            object_sha=$(jq -r '.object.sha // empty' "$tag_body_file")
            rm -f "$tag_body_file" "$tag_header_file"
          fi

          rm -f "$body_file" "$header_file"
          [[ -n "$object_sha" ]] || return 1
          printf '%s\n' "$object_sha"
        }

        REVISION="${{ steps.set-vars.outputs.flutter_commit }}"
        if [ -z "$REVISION" ] || [ "$REVISION" = "null" ]; then
          echo "根据版本解析 Flutter 提交..."
          REVISION=$(resolve_tag_commit "${{ steps.set-vars.outputs.flutter_version }}") || true
        fi
        if [ -z "$REVISION" ] || [ "$REVISION" = "null" ]; then
          echo "❌ 无法解析 Flutter 提交"
          exit 1
        fi
        echo "revision=$REVISION" >> $GITHUB_OUTPUT
        echo "REVISION=$REVISION" >> $GITHUB_ENV
    
    - name: Clone Flutter Engine
      run: |
        echo "准备 Flutter Engine 源码..."
        mkdir -p "$ENGINE_DIR"
        cd "$ENGINE_DIR"
        
        # 克隆 Flutter 主仓库到当前目录
        echo "克隆 flutter/flutter..."
        git clone https://github.com/flutter/flutter.git .
        
        echo "切换到修订 $REVISION (tag: ${{ steps.set-vars.outputs.flutter_version }})..."
        git checkout $REVISION
        
        # 复制 gclient 配置文件
        echo "配置 gclient..."
        cp engine/scripts/standard.gclient .gclient
        
        echo "同步 DEPS 依赖..."
        # 设置 Git 配置避免警告
        export GIT_CONFIG_COUNT=1
        export GIT_CONFIG_KEY_0=protocol.file.allow
        export GIT_CONFIG_VALUE_0=always
        
        gclient sync --verbose
        
        echo "✅ 源码同步完成"
        df -h
    
    - name: Modify GN configuration for fontconfig
      run: |
        echo "修改 GN 配置以启用 fontconfig..."
        cd "$ENGINE_DIR"
        
        # 确保 GN 参数中包含 fontconfig 支持
        # 这会在后续的 gn 命令中通过 --enable-fontconfig 传递
        
        echo "✅ 配置已准备"
    
    - name: Generate build files with fontconfig
      run: |
        echo "生成构建配置..."
        cd "$ENGINE_DIR/engine/src"
        
        ./flutter/tools/gn \
          --target-os linux \
          --linux-cpu arm64 \
          --runtime-mode release \
          --enable-fontconfig \
          --no-goma \
          --no-prebuilt-dart-sdk
        
        echo "✅ 构建配置生成完成"
        ls -la out/linux_release_arm64/
    
    - name: Build Flutter Engine
      run: |
        echo "开始编译 Flutter Engine..."
        cd "$ENGINE_DIR/engine/src"
        
        # 使用所有可用的 CPU 核心
        JOBS=$(nproc)
        echo "使用 $JOBS 个并行任务"
        
        ninja -C out/linux_release_arm64 -j $JOBS
        
        echo "✅ 编译完成"
    
    - name: Extract and verify SO file
      run: |
        VERSION="${{ steps.set-vars.outputs.flutter_version }}"
        SO_SOURCE="$ENGINE_DIR/engine/src/out/linux_release_arm64/libflutter_linux_gtk.so"
        SO_DEST="lib/libflutter_linux_gtk.so.$VERSION"
        
        echo "提取 SO 文件..."
        mkdir -p lib
        cp "$SO_SOURCE" "$SO_DEST"
        
        echo "文件信息："
        file "$SO_DEST"
        ls -lh "$SO_DEST"
        
        echo "验证 fontconfig 链接："
        if readelf -d "$SO_DEST" | grep -q fontconfig; then
          echo "✅ fontconfig 已正确链接"
          readelf -d "$SO_DEST" | grep fontconfig
        else
          echo "❌ 警告: 未找到 fontconfig 链接"
          readelf -d "$SO_DEST" | head -20
          exit 1
        fi
    
    - name: Upload SO file as artifact
      uses: actions/upload-artifact@v4
      with:
        name: libflutter_linux_gtk.so.${{ steps.set-vars.outputs.flutter_version }}
        path: lib/libflutter_linux_gtk.so.${{ steps.set-vars.outputs.flutter_version }}
        retention-days: 30
    
    - name: Update lib README
      run: |
        VERSION="${{ steps.set-vars.outputs.flutter_version }}"
        FLUTTER_COMMIT="${{ steps.set-vars.outputs.flutter_commit }}"
        SIZE=$(du -h "lib/libflutter_linux_gtk.so.$VERSION" | cut -f1)
        
        cat >> lib/README.md << __EOF__

        ## Flutter $VERSION
        - Flutter Commit: ${FLUTTER_COMMIT:-N/A}
        - Built on: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
        - Size: $SIZE
        - Platform: Linux ARM64
        - Build Type: Release
        - Features: Fontconfig enabled
        - Built by: GitHub Actions

        __EOF__
        
        echo "✅ README 已更新"
    
    - name: Commit and push
      run: |
        VERSION="${{ steps.set-vars.outputs.flutter_version }}"
        FLUTTER_COMMIT="${{ steps.set-vars.outputs.flutter_commit }}"
        
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        
        # 检查是否有新文件
        git add lib/
        if git diff --cached --quiet; then
          echo "ℹ️ 无需推送，未检测到新的变更"
          exit 0
        fi
        
        # 先提交本地更改
        SIZE=$(du -h lib/libflutter_linux_gtk.so.$VERSION | cut -f1)
        git commit -m "chore: add Flutter Engine $VERSION with fontconfig support" \
          -m "Built from flutter/flutter@${FLUTTER_COMMIT}" \
          -m "Added --enable-fontconfig flag" \
          -m "Linux ARM64 release build" \
          -m "Auto-built by GitHub Actions" \
          -m "Size: $SIZE"
        
        # 使用 --autostash 选项拉取并 rebase（自动处理未提交的内容）
        echo "更新本地 main 分支以避免推送冲突..."
        git pull --rebase --autostash origin main
        
        git push origin HEAD:main
        
        echo "✅ 已推送到仓库"
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: flutter-${{ steps.set-vars.outputs.flutter_version }}
        name: Flutter Engine ${{ steps.set-vars.outputs.flutter_version }} (ARM64 + Fontconfig)
        body: |
          ## 🚀 Flutter Engine with Fontconfig Support
          
          **Flutter SDK Version**: ${{ steps.set-vars.outputs.flutter_version }}  
          **Flutter Commit**: ${{ steps.set-vars.outputs.flutter_commit }}  
          **Platform**: Linux ARM64  
          **Build Type**: Release  
          **Special Features**: Compiled with `--enable-fontconfig` to fix CJK font rendering
          
          ### 📦 What's Included
          - `libflutter_linux_gtk.so.${{ steps.set-vars.outputs.flutter_version }}` - Flutter Engine shared library
          
          ### ✅ Verification
          This build includes fontconfig support, verified by:
          ```bash
          readelf -d libflutter_linux_gtk.so.${{ steps.set-vars.outputs.flutter_version }} | grep fontconfig
          # Expected output: libfontconfig.so.1
          ```
          
          ### 📥 Usage
          ```bash
          # Download and use with flutter-font-fix tool
          sudo flutter-font-fix -a <your-flutter-app>
          ```
          
          ### 🔗 Related
          - Original issue: CJK characters displaying as squares (□□□) on Linux ARM64
          - Root cause: Official Flutter Engine lacks fontconfig support on ARM64
          - Solution: This custom build with fontconfig enabled
          - Source: https://github.com/flutter/flutter/commit/${{ steps.set-vars.outputs.flutter_commit }}
          
          ---
          **Auto-built by GitHub Actions** on $(date -u '+%Y-%m-%d')
        files: |
          lib/libflutter_linux_gtk.so.${{ steps.set-vars.outputs.flutter_version }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Cleanup
      if: always()
      run: |
        echo "清理构建文件..."
        df -h
        # 保留缓存，只清理临时文件
        rm -rf "$ENGINE_DIR/out/linux_release_arm64/obj" || true
        echo "✅ 清理完成"
